groups:
  - name: signhex_platform_alerts
    interval: 1m
    rules:
      - alert: SignhexPrometheusUnavailable
        expr: up{job="prometheus"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Prometheus is unavailable"
          description: "Prometheus on {{ $labels.instance }} has been unreachable for 5 minutes."

      - alert: SignhexBackendMetricsUnavailable
        expr: up{job="signhex-server"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Backend metrics are unavailable"
          description: "signhex-server on {{ $labels.instance }} has been unreachable for 5 minutes."

      - alert: SignhexVm1DataMetricsUnavailable
        expr: up{job=~"vm1-node|vm1-postgres|vm1-minio"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "VM1 data-plane metrics target is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been unreachable for 5 minutes."

      - alert: SignhexVm3HostMetricsUnavailable
        expr: up{job="vm3-node"} == 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "VM3 host metrics are unavailable"
          description: "vm3-node on {{ $labels.instance }} has been unreachable for 10 minutes."

      - alert: SignhexGrafanaMetricsUnavailable
        expr: up{job="vm3-grafana"} == 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Grafana metrics are unavailable"
          description: "Grafana on {{ $labels.instance }} has been unreachable for 10 minutes."

      - alert: SignhexPostgresUnavailable
        expr: pg_up == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL is unavailable"
          description: "postgres_exporter can reach {{ $labels.instance }}, but PostgreSQL is reporting down."

      - alert: SignhexMinioMetricsUnavailable
        expr: up{job="vm1-minio"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "MinIO metrics are unavailable"
          description: "MinIO cluster metrics on {{ $labels.instance }} have been unreachable for 5 minutes."

      - alert: SignhexBackendHttp5xxHigh
        expr: signhex:backend_http_error_rate:ratio > 0.05
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Backend 5xx rate is elevated"
          description: "The backend 5xx ratio has been above 5% for 10 minutes."

      - alert: SignhexHostCpuHigh
        expr: signhex:host_cpu_utilization:ratio > 0.85
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Host CPU utilization is high"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been above 85% CPU for 15 minutes."

      - alert: SignhexHostFilesystemHigh
        expr: signhex:host_filesystem_utilization:ratio{job!="vm1-node"} > 0.90
        for: 15m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Host filesystem utilization is high"
          description: "{{ $labels.job }} on {{ $labels.instance }} has a filesystem above 90% utilization."

      - alert: SignhexVm1DataFilesystemHigh
        expr: signhex:host_filesystem_utilization:ratio{job="vm1-node"} > 0.85
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "VM1 data machine filesystem utilization is high"
          description: "VM1 data storage on {{ $labels.instance }} has been above 85% utilization for 10 minutes and may impact PostgreSQL or MinIO."

      - alert: SignhexHostMemoryHigh
        expr: signhex:host_memory_utilization:ratio > 0.90
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Host memory utilization is high"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been above 90% memory utilization for 15 minutes."

      - alert: SignhexFleetHeartbeatsStalled
        expr: signhex_fleet_latest_heartbeat_age_seconds > 600 and signhex:fleet_total_players >= 1
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Player fleet heartbeats are stalled"
          description: "The backend has not recorded a fresh player heartbeat for more than 10 minutes."

      - alert: SignhexFleetOfflinePlayersHigh
        expr: signhex:fleet_offline_players_ratio > 0.25 and signhex:fleet_total_players >= 4
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Offline player ratio is elevated"
          description: "More than 25% of the known player fleet has been marked OFFLINE for 15 minutes."
